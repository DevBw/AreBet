<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetHelper - Offline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="text-center max-w-md mx-auto px-4">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <i class="ri-wifi-off-line text-6xl text-gray-400 mb-4"></i>
            <h1 class="text-2xl font-bold text-gray-900 mb-2">You're Offline</h1>
            <p class="text-gray-600 mb-6">Please check your internet connection and try again.</p>
            <button onclick="window.location.reload()" class="bg-green-500 text-white px-6 py-3 rounded-lg hover:bg-green-600 transition-colors">
                <i class="ri-refresh-line mr-2"></i>
                Try Again
            </button>
        </div>
    </div>
</body>
</html>
