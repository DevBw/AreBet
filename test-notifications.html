<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification System Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Notification System Test</h1>
        
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-900 mb-4">Test Controls</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button id="testMatchUpdate" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition-colors">
                    <i class="ri-football-line mr-2"></i>Add Match Update
                </button>
                
                <button id="testPrediction" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition-colors">
                    <i class="ri-lightbulb-line mr-2"></i>Add Prediction
                </button>
                
                <button id="testSystem" class="bg-gray-500 text-white px-4 py-2 rounded-lg hover:bg-gray-600 transition-colors">
                    <i class="ri-settings-3-line mr-2"></i>Add System Notification
                </button>
                
                <button id="testBetResult" class="bg-yellow-500 text-white px-4 py-2 rounded-lg hover:bg-yellow-600 transition-colors">
                    <i class="ri-money-dollar-circle-line mr-2"></i>Add Bet Result
                </button>
            </div>
            
            <div class="mt-4 flex space-x-2">
                <button id="markAllRead" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition-colors">
                    Mark All Read
                </button>
                
                <button id="clearAll" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition-colors">
                    Clear All
                </button>
                
                <button id="generateDemo" class="bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600 transition-colors">
                    Generate Demo
                </button>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6">
            <h2 class="text-xl font-semibold text-gray-900 mb-4">Notification Badge</h2>
            <div class="flex items-center space-x-4">
                <button class="p-2 text-gray-400 hover:text-gray-600 transition-colors relative focus:outline-none focus:ring-2 focus:ring-green-500 rounded-lg">
                    <i class="ri-notification-3-line text-lg"></i>
                    <span id="notificationBadge" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center min-w-5 hidden">0</span>
                </button>
                <span class="text-sm text-gray-600">Unread count: <span id="unreadCount">0</span></span>
            </div>
        </div>
    </div>

    <!-- Notification Modal -->
    <div id="notificationModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 mx-4 max-w-lg w-full max-h-[80vh] overflow-hidden">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold text-gray-900">Notifications</h3>
                <div class="flex items-center space-x-2">
                    <button id="markAllReadModal" class="text-sm text-green-500 hover:text-green-600 transition-colors">
                        Mark all read
                    </button>
                    <button id="closeNotificationModal" class="text-gray-400 hover:text-gray-600 transition-colors">
                        <i class="ri-close-line text-xl"></i>
                    </button>
                </div>
            </div>
            
            <div class="mb-4">
                <div class="flex space-x-2 overflow-x-auto pb-2">
                    <button class="notification-filter-btn active bg-green-500 text-white px-3 py-1 rounded text-sm whitespace-nowrap">
                        All
                    </button>
                    <button class="notification-filter-btn bg-gray-200 text-gray-700 px-3 py-1 rounded text-sm whitespace-nowrap">
                        Match Updates
                    </button>
                    <button class="notification-filter-btn bg-gray-200 text-gray-700 px-3 py-1 rounded text-sm whitespace-nowrap">
                        Predictions
                    </button>
                    <button class="notification-filter-btn bg-gray-200 text-gray-700 px-3 py-1 rounded text-sm whitespace-nowrap">
                        System
                    </button>
                </div>
            </div>
            
            <div id="notificationList" class="overflow-y-auto max-h-96">
                <!-- Notifications will be loaded here -->
                <div class="text-center py-8 text-gray-500">
                    <i class="ri-notification-3-line text-3xl mb-2"></i>
                    <p>No notifications yet</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/notification-service.js"></script>
    <script>
        // Initialize notification service
        const notificationService = new NotificationService();
        
        // Test buttons
        document.getElementById('testMatchUpdate').onclick = () => {
            notificationService.addNotification(
                notificationService.notificationTypes.MATCH_UPDATE,
                'Match Started',
                'Manchester United vs Liverpool has started!'
            );
        };
        
        document.getElementById('testPrediction').onclick = () => {
            notificationService.addNotification(
                notificationService.notificationTypes.PREDICTION,
                'New Prediction',
                'High confidence prediction for Arsenal vs Chelsea'
            );
        };
        
        document.getElementById('testSystem').onclick = () => {
            notificationService.addNotification(
                notificationService.notificationTypes.SYSTEM,
                'System Update',
                'New features available in BetHelper v2.0'
            );
        };
        
        document.getElementById('testBetResult').onclick = () => {
            notificationService.addNotification(
                notificationService.notificationTypes.BET_RESULT,
                'Bet Result',
                'Your bet on Barcelona has won! +$25.50'
            );
        };
        
        document.getElementById('markAllRead').onclick = () => {
            notificationService.markAllAsRead();
        };
        
        document.getElementById('clearAll').onclick = () => {
            notificationService.clearAllNotifications();
        };
        
        document.getElementById('generateDemo').onclick = () => {
            notificationService.generateDemoNotifications();
        };
        
        // Modal controls
        document.getElementById('closeNotificationModal').onclick = () => {
            document.getElementById('notificationModal').classList.add('hidden');
        };
        
        document.getElementById('markAllReadModal').onclick = () => {
            notificationService.markAllAsRead();
        };
        
        // Filter buttons
        document.querySelectorAll('.notification-filter-btn').forEach(button => {
            button.addEventListener('click', () => {
                document.querySelectorAll('.notification-filter-btn').forEach(btn => {
                    btn.classList.remove('active', 'bg-green-500', 'text-white');
                    btn.classList.add('bg-gray-200', 'text-gray-700');
                });
                button.classList.add('active', 'bg-green-500', 'text-white');
                button.classList.remove('bg-gray-200', 'text-gray-700');
                
                notificationService.setFilter(button.textContent.trim());
            });
        });
        
        // Update unread count display
        function updateUnreadDisplay() {
            document.getElementById('unreadCount').textContent = notificationService.unreadCount;
        }
        
        // Initial update
        updateUnreadDisplay();
        
        // Update display when notifications change
        setInterval(updateUnreadDisplay, 1000);
    </script>
</body>
</html>
